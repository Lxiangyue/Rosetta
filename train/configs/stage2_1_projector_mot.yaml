# ==============================================================================
# Stage 2.1: Projector Warmup (MMU Caption Only) - MoT Baseline
# Train only the projector, freeze backbone, use MMU caption data only.
# This is the first sub-stage of Stage 2, preparing for full MMU training.
#
# Usage:
#   bash scripts/run/run_stage2_1_projector_mot.sh
# Override paths via environment variables:
#   CKPT_DIR   — Stage 1 MoT checkpoint (und-only, use_mot=False)
#   OUTPUT_DIR — Training output directory
# ==============================================================================

__GLOBAL_VARS__:
  _DEFAULT_ASSETS_BASE: ./public_assets
  ASSETS_BASE: ${oc.env:ASSETS_BASE,${__GLOBAL_VARS__._DEFAULT_ASSETS_BASE}}

MODEL_ARGS:
  model-name: multimodal.qwen3-06b-mot
  model-structure: MultimodalModel
  max-position-embeddings: 32768
  seq-length: 8192
  init-device: cpu
  autocast-dtype: bf16
  enabled:
    - bf16
EXTRA_MODEL_ARGS:
  enabled:
    - use-vit
    - vit-frozen
    - lm-frozen
  vit-type: qwen3vl-vit-for-0.6b
  __FROZEN__EXTRA_MODEL_ARGS:
    vit_config:
      attn_implementation: flash_attention_2
      spatial_merge_size: 2

DATA_ARGS:
  tokenizer-name: qwen3-0.6b-base
  tokenizer-class: tokenizer.Qwen3BaseTokenizerFast
  sequence-template: instruct
  modality:
    - text
    - vit_image
  mmu_task_kwargs: {}
  # Note: Full training uses "mmu_caption", but example data uses "mmu"
  data-weights: '{"mmu": 1.0}'
  max-seq-len: 8192
  mmu-data: example_data/mmu/llava_ov_si.jsonl
  mmu-image-dir: example_data/mmu/images

# ==============================================================================
# Training hyperparameters for Stage 2.1 Projector Warmup (MoT)
# ==============================================================================
TRAIN_ARGS:
  enabled: []
  lr: 1e-4
  min-lr: 1e-5
  adam-beta1: 0.9
  adam-beta2: 0.95
  max-steps: 3000
  warmup-steps: 1000
  lr-decay-steps: 100000000
  weight-decay: 0.1
  grad-clip: 1.0
  log-interval: 1
  save-interval: 1000
  gradient-accumulation-steps: 1
  moe-aux-loss-coeff: 0.01
  sharding-strategy: HYBRID_SHARD
  num-shard: 8
  seed: 1234
